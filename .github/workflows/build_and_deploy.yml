name: Build and deploy to AKS cluster

on:
  push:
    branches: [master]
  pull_request:
    types: [labeled, opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        default: review
        options:
          - review
          - staging
          - production
          - test
      docker-image-tag:
        description: "Docker image tag to deploy"
        required: true
        type: string
      pull-request-number:
        description: "Pull request number (required for review environment)"
        required: false
        type: string

concurrency: deploy-${{ github.ref }}

permissions:
  packages: write
  pull-requests: write

jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      docker-image-tag: ${{ steps.build-image.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build and push docker image
        id: build-image
        uses: DFE-Digital/github-actions/build-docker-image@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          target: web
          context: .
          snyk-token: ${{ secrets.SNYK_TOKEN }}

  check_test_env:
    name: Check test environment deployments
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      deployments: read
    outputs:
      deploy_test: ${{ steps.check_test_deployment.outputs.deploy_test }}
    steps:
      - uses: actions/github-script@v9
        id: check_test_deployment
        with:
          script: |
            // If the current test deployment has not come from master then we don't want to overwrite it

            const { owner, repo } = context.repo;
            const testEnvironmentName = "test";

            const deployments = await github.rest.repos.listDeployments({ owner, repo, environment: testEnvironmentName, per_page: 20 });
            if (deployments.data.length === 0) {
              core.setOutput("deploy_test", true);
              return;
            }

            let latestSuccessfulDeployment = null;

            for (const deployment of deployments.data) {
              const statuses = await github.rest.repos.listDeploymentStatuses({owner, repo, deployment_id: deployment.id, per_page: 1 });
              const latestStatus = statuses.data[0];
              core.info(`Deployment ${deployment.id} ref=${deployment.ref} status=${latestStatus?.state}`);

              if (latestStatus?.state === "success") {
                latestSuccessfulDeployment = deployment;
                break;
              }
            }

            if (!latestSuccessfulDeployment) {
              core.info("No successful test deployments found, allowing deployment");
              core.setOutput("deploy_test", true);
              return;
            }

            const deployedRef = latestSuccessfulDeployment.ref;
            core.info(`DEBUG - Latest successful test deployment ref: ${deployedRef}`);

            let deployTest = true;

            if (deployedRef !== "master") {
              const branches = await github.rest.repos.listBranches({ owner, repo, per_page: 100 });
              const branchExists = branches.data.some(branch => branch.name === deployedRef);

              if (branchExists) {
                deployTest = false;
                core.info(`Test environment is currently owned by branch '${deployedRef}'`);
              } else {
                core.info(`Branch '${deployedRef}' no longer exists, allowing deployment`);
              }
            } else {
              core.info("Latest successful deployment was from master, allowing deployment");
            }

            core.setOutput("deploy_test", deployTest);

  deploy_test:
    name: Deploy to test environment
    runs-on: ubuntu-latest
    concurrency: deploy_test
    needs: [build, deploy_production, check_test_env]

    if: |
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      needs.check_test_env.outputs.deploy_test == 'true'
    environment:
      name: test
    outputs:
      environment_url: ${{ steps.deploy.outputs.environment_url }}
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-environment
        id: deploy
        with:
          environment: test
          docker-image: ${{ needs.build.outputs.docker-image-tag }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          aks-namespace: srtl-test
          aks-deployment: claim-additional-payments-for-teaching-test

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run smoke tests
        shell: bash
        run: bundle exec rspec spec/smoke -t smoke:true -b
        env:
          RAILS_ENV: test
          SMOKE_TEST_APP_HOST: ${{ vars.SMOKE_TEST_APP_HOST }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}

      - name: Notify teams channel failure
        if: ${{ failure() }}
        uses: DFE-Digital/github-actions/send-to-teams-channel@master
        with:
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: Failure deploying release to test
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
          message: Failure deploying release to test - Docker tag ${{ needs.build.outputs.docker-image-tag }}

  deploy_review:
    name: Deploy to review environment
    concurrency: deploy_review_${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy') }}
    needs: [build]
    environment:
      name: review
    permissions:
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: ./.github/actions/deploy-environment
        id: deploy
        with:
          environment: review
          docker-image: ${{ needs.build.outputs.docker-image-tag }}
          pull-request-number: ${{ github.event.pull_request.number }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          aks-namespace: srtl-development
          aks-deployment: claim-additional-payments-for-teaching-review-${{ github.event.pull_request.number }}

      - name: Post comment to Pull Request ${{ github.event.number }}
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # Pinned at v2.9.4
        with:
          header: aks
          message: |
            ### Deployments

            | Journey                     | URL                                                                                 |
            | --------------------------- | ------------------------------------------------------------------------------------|
            | Targeted Retention Payments | <${{ env.APP_URL }}/targeted-retention-incentive-payments/landing-page>             |
            | Student Loans               | <${{ env.APP_URL }}/student-loans/claim>                                            |
            | Further Education           | <${{ env.APP_URL }}/further-education-payments/landing-page>                        |
            | Further Education Providers | <${{ env.APP_URL }}/further-education-payments/providers/claims>                    |
            | Early Years Payment         | <${{ env.APP_URL }}/early-years-payment/landing-page>                               |
            | Relocation Payments         | <${{ env.APP_URL }}/get-a-teacher-relocation-payment/landing-page>                  |
            | Early Years Teachers        | <${{ env.APP_URL }}/early-years-teachers-recognition-payments/landing-page> |
            | Admin                       | <${{ env.APP_URL }}/admin>                                                          |

  deploy_staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    concurrency: deploy_staging
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [build]
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.environment_url }}
    outputs:
      environment_url: ${{ steps.deploy.outputs.environment_url }}
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-environment
        id: deploy
        with:
          environment: staging
          docker-image: ${{ needs.build.outputs.docker-image-tag }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          aks-namespace: srtl-test
          aks-deployment: claim-additional-payments-for-teaching-staging

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run smoke tests
        shell: bash
        run: bundle exec rspec spec/smoke -t smoke:true -b
        env:
          RAILS_ENV: test
          SMOKE_TEST_APP_HOST: ${{ vars.SMOKE_TEST_APP_HOST }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}

      - name: Notify teams channel failure
        if: ${{ failure() }}
        uses: DFE-Digital/github-actions/send-to-teams-channel@master
        with:
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: Failure deploying release to staging
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
          message: Failure deploying release to staging - Docker tag ${{ needs.build.outputs.docker-image-tag }}

  deploy_production:
    name: Deploy to production
    runs-on: ubuntu-latest
    concurrency: deploy_production
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [build, deploy_staging]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.environment_url }}
    outputs:
      environment_url: ${{ steps.deploy.outputs.environment_url }}
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: ./.github/actions/deploy-environment
        id: deploy
        with:
          environment: production
          docker-image: ${{ needs.build.outputs.docker-image-tag }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          aks-namespace: srtl-production
          aks-deployment: claim-additional-payments-for-teaching-production

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run smoke tests
        shell: bash
        run: bundle exec rspec spec/smoke -t smoke:true -b
        env:
          RAILS_ENV: test
          SMOKE_TEST_APP_HOST: ${{ vars.SMOKE_TEST_APP_HOST }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}

      - name: Notify teams channel failure
        if: ${{ failure() }}
        uses: DFE-Digital/github-actions/send-to-teams-channel@master
        with:
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          title: Failure deploying release to production
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
          message: Failure deploying release to production - Docker tag ${{ needs.build.outputs.docker-image-tag }}

  manual_deploy:
    name: Deploy to ${{ inputs.environment }}
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    concurrency: deploy_${{ inputs.environment }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy_manual.outputs.environment_url }}
    outputs:
      environment_url: ${{ steps.deploy_manual.outputs.environment_url }}
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set env vars
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" == 'review' ]; then
            AKS_NAMESPACE=srtl-development
            AKS_DEPLOYMENT=claim-additional-payments-for-teaching-review-${{ inputs.pull-request-number }}
          else
            AKS_NAMESPACE=srtl-${{ inputs.environment }}
            AKS_DEPLOYMENT=claim-additional-payments-for-teaching-${{ inputs.environment }}
          fi
          echo "AKS_NAMESPACE=$AKS_NAMESPACE" >> $GITHUB_ENV
          echo "AKS_DEPLOYMENT=$AKS_DEPLOYMENT" >> $GITHUB_ENV

      - uses: ./.github/actions/deploy-environment
        id: deploy_manual
        with:
          environment: ${{ inputs.environment }}
          docker-image: ${{ inputs.docker-image-tag }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          aks-namespace: ${{ env.AKS_NAMESPACE }}
          aks-deployment: ${{ env.AKS_DEPLOYMENT }}
          pull-request-number: ${{ inputs.pull-request-number }}

      - name: Install Ruby
        if: ${{ inputs.environment != 'review' }}
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run smoke tests
        if: ${{ inputs.environment != 'review' }}
        shell: bash
        run: bundle exec rspec spec/smoke -t smoke:true -b
        env:
          RAILS_ENV: test
          SMOKE_TEST_APP_HOST: ${{ vars.SMOKE_TEST_APP_HOST }}
          BASIC_AUTH_USERNAME: ${{ secrets.BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}

  deploy_domains_infra:
    name: Deploy Domains Infrastructure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    concurrency: deploy_production
    needs: [deploy_production]
    environment:
      name: production
    permissions:
      id-token: write

    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Domains Infrastructure
        id: deploy_domains_infra
        uses: DFE-Digital/github-actions/deploy-domains-infra@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}

  deploy_domains_env:
    name: Deploy Domains to ${{ matrix.domain_environment }} environment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    concurrency: deploy_${{ matrix.domain_environment }}
    needs: [deploy_domains_infra]
    strategy:
      max-parallel: 1
      matrix:
        domain_environment: [staging, production, test]
    environment:
      name: production
    permissions:
      id-token: write

    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Domains Environment
        id: deploy_domains_env
        uses: DFE-Digital/github-actions/deploy-domains-env@master
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: ${{ matrix.domain_environment }}
          healthcheck: healthcheck
          teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
